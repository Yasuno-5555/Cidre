# Jackrose Seed Image Builder Profile Configuration
# Profile: jackrose-seed

JACKROSE_PROFILE_NAME="jackrose-seed"
JACKROSE_ARCH="aarch64"
JACKROSE_BASE_ROOTFS=""
JACKROSE_WORKDIR="work/jackrose-seed"
JACKROSE_ROOTFS_DIR="work/jackrose-seed/rootfs"
JACKROSE_OUTPUT_DIR="out"
JACKROSE_LOCAL_PACKAGE_DIR="packages/out"
JACKROSE_IMAGE_NAME="jackrose-seed-aarch64"
JACKROSE_IMAGE_FORMAT="tar.zst"

# Jackrose custom environment packages
JACKROSE_JACKROSE_PACKAGES=(
  jackrose-seed
  jackrose-firstboot
  jackrose-welcome
  jackrose-healthcheck
  jackrose-config
  jackrose-user-setup
  jackrose-meta-desktop-baseline
  jackrose-experience-upgrade
  jackrose-meta-desktop-optimized
)

# Base distribution required packages
JACKROSE_BASE_PACKAGES=(
  networkmanager
  sudo
  bash
)

JACKROSE_IMAGE_VERSION="0.10.0"
JACKROSE_IMAGE_CHANNEL="local"
